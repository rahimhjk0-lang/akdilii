<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Akdili</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0ede8; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.15); max-width: 400px; width: 100%; }
        .card-header { background: #1a1a2e; padding: 2rem; text-align: center; }
        .btn-admin { background: #c9a96e; color: white; border: none; border-radius: 10px; }
        .btn-admin:hover { background: #b8935a; color: white; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h4 class="text-white fw-700 mb-1">🛡️ Akdili Admin</h4>
        <p class="text-white-50 small mb-0">لوحة التحكم الخاصة</p>
    </div>
    <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/admin/login">
            <div class="mb-3">
                <label class="form-label fw-700 small">كلمة السر</label>
                <input type="password" name="password" class="form-control"
                       placeholder="أدخل كلمة سر Admin" required
                       style="border-radius:10px; font-size:1.1rem; letter-spacing:3px;">
            </div>
            <button type="submit" class="btn btn-admin w-100 py-2 fw-700">
                دخول للوحة Admin
            </button>
        </form>
    </div>
</div>
</body>
</html>
