<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akdili Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(201,169,110,0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: rgba(201,169,110,0.15);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }
        h4 { color: #c9a96e; font-weight: 800; }
        .form-control {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.09);
            border-color: #c9a96e;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.15);
        }
        .form-label { color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600; }
        .btn-admin {
            background: linear-gradient(135deg, #c9a96e, #b8955a);
            color: #1a1a2e;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            width: 100%;
        }
        .btn-admin:hover { background: linear-gradient(135deg, #b8955a, #a07840); color: #1a1a2e; }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #f87171;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="brand-icon">🛡️</div>
    <h4 class="text-center mb-1">Akdili Admin</h4>
    <p class="text-center mb-4" style="color:rgba(255,255,255,0.3);font-size:13px;">لوحة التحكم الخاصة</p>

    {% if error %}
    <div class="error-msg mb-3">
        <i class="fas fa-exclamation-circle ms-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
        <div class="mb-4">
            <label class="form-label">كلمة السر</label>
            <input type="password" name="password" class="form-control"
                   placeholder="أدخل كلمة سر الأدمن" autofocus>
        </div>
        <button type="submit" class="btn-admin">
            <i class="fas fa-shield-alt ms-2"></i> دخول
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
