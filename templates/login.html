{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);">
    <div class="card border-0 shadow-lg" style="width:420px; border-radius:20px; overflow:hidden;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-800" style="color:#1a1a2e;">🚀 اكدلي</h2>
                <p class="text-muted">منصة تتبع الطرود الذكية</p>
            </div>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label fw-600">الإيميل</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="example@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-600">كلمة السر</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 btn-lg">
                    <i class="fas fa-sign-in-alt ms-2"></i> دخول
                </button>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted">ما عندكش حساب؟</span>
                <a href="/register" class="text-success fw-600 me-1">سجل الآن</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
