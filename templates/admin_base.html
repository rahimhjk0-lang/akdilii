<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akdili Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: #0f0f1a; color: #e2e8f0; min-height: 100vh; }

        /* ===== Sidebar ===== */
        .admin-sidebar {
            position: fixed;
            right: 0; top: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #13131f 0%, #1a1a2e 100%);
            border-left: 1px solid rgba(201,169,110,0.15);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .admin-brand {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(201,169,110,0.1);
        }
        .admin-brand h4 {
            color: #c9a96e;
            font-weight: 800;
            font-size: 1.3rem;
            margin: 0;
        }
        .admin-brand small { color: rgba(255,255,255,0.4); font-size: 11px; }

        .admin-nav { flex: 1; padding: 16px 12px; }
        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .admin-nav-link:hover { background: rgba(201,169,110,0.1); color: #c9a96e; }
        .admin-nav-link.active { background: rgba(201,169,110,0.15); color: #c9a96e; }
        .admin-nav-link i { width: 18px; text-align: center; }

        .admin-nav-label {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 14px 6px;
        }

        .admin-logout {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        /* ===== Main ===== */
        .admin-main {
            margin-right: 240px;
            min-height: 100vh;
            padding: 28px;
        }

        /* ===== Topbar ===== */
        .admin-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .admin-topbar h5 {
            font-weight: 800;
            font-size: 1.3rem;
            color: #fff;
            margin: 0;
        }
        .admin-topbar small { color: rgba(255,255,255,0.4); }

        /* ===== Cards ===== */
        .admin-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(201,169,110,0.1);
            border-radius: 16px;
            padding: 22px;
        }
        .stat-box {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid rgba(201,169,110,0.12);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 50%;
            opacity: 0.05;
        }
        .stat-box .stat-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin-bottom: 14px;
        }
        .stat-box .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            line-height: 1;
            margin-bottom: 4px;
        }
        .stat-box .stat-lbl { color: rgba(255,255,255,0.4); font-size: 13px; }

        /* ===== Table ===== */
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
        .admin-table thead th {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 8px 14px;
            text-transform: uppercase;
            border: none;
        }
        .admin-table tbody tr {
            background: rgba(255,255,255,0.03);
            transition: background 0.2s;
        }
        .admin-table tbody tr:hover { background: rgba(201,169,110,0.06); }
        .admin-table tbody td {
            padding: 12px 14px;
            border: none;
            vertical-align: middle;
            font-size: 14px;
        }
        .admin-table tbody td:first-child { border-radius: 10px 0 0 10px; }
        .admin-table tbody td:last-child  { border-radius: 0 10px 10px 0; }

        /* ===== Badges ===== */
        .badge-active   { background: rgba(34,197,94,0.15); color: #4ade80; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-inactive { background: rgba(239,68,68,0.15);  color: #f87171; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-plan     { background: rgba(201,169,110,0.15); color: #c9a96e; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }

        /* ===== Buttons ===== */
        .btn-gold { background: #c9a96e; color: #1a1a2e; font-weight: 700; border: none; border-radius: 8px; }
        .btn-gold:hover { background: #b8955a; color: #1a1a2e; }

        /* ===== Mobile ===== */
        @media (max-width: 768px) {
            .admin-sidebar { display: none; }
            .admin-main { margin-right: 0; padding: 16px; }
        }

        /* Alert */
        .admin-alert {
            background: rgba(234,179,8,0.1);
            border: 1px solid rgba(234,179,8,0.3);
            border-radius: 12px;
            padding: 14px 18px;
            color: #fde047;
            font-size: 13px;
        }

        /* Modal */
        .modal { z-index: 1055 !important; }
        .modal-backdrop { z-index: 1050 !important; opacity: 0.7 !important; background: #000 !important; }
        .modal-content {
            background: #1e1e32 !important;
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 16px;
            color: #e2e8f0;
        }
        .modal-header  { border-bottom: 1px solid rgba(255,255,255,0.08); }
        .modal-footer  { border-top: 1px solid rgba(255,255,255,0.08); }
        .form-control, .form-select {
            background: rgba(255,255,255,0.07) !important;
            border: 1px solid rgba(255,255,255,0.15) !important;
            color: #fff !important;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.1) !important;
            border-color: #c9a96e !important;
            color: #fff !important;
            box-shadow: 0 0 0 3px rgba(201,169,110,0.15) !important;
        }
        .form-select option { background: #1e1e32; color: #fff; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; }

        /* ===== Mobile Bottom Nav (Admin) ===== */
        .admin-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; right: 0; left: 0;
            height: 68px;
            background: linear-gradient(135deg, #13131f, #1a1a2e);
            border-top: 1px solid rgba(201,169,110,0.15);
            z-index: 200;
        }
        .admin-bottom-nav .nav-items {
            display: flex;
            height: 100%;
            align-items: stretch;
        }
        .admin-bottom-nav .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            gap: 4px;
            transition: all 0.2s;
        }
        .admin-bottom-nav .nav-item i { font-size: 20px; }
        .admin-bottom-nav .nav-item.active,
        .admin-bottom-nav .nav-item:active { color: #c9a96e; }
        @media (max-width: 768px) {
            .admin-bottom-nav { display: flex; }
            .admin-main { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<nav class="admin-sidebar">
    <div class="admin-brand">
        <h4>🛡️ Akdili Admin</h4>
        <small>لوحة التحكم الخاصة</small>
    </div>

    <div class="admin-nav">
        <div class="admin-nav-label">القائمة</div>
        <a href="/admin" class="admin-nav-link {% if request.url.path == '/admin' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> الإحصائيات
        </a>
        <a href="/admin" class="admin-nav-link {% if '/merchants' in request.url.path %}active{% endif %}">
            <i class="fas fa-users"></i> التجار
        </a>


    </div>

    <div class="admin-logout">
        <a href="/admin/logout" class="admin-nav-link" style="color:#f87171;">
            <i class="fas fa-sign-out-alt"></i> خروج
        </a>
    </div>
</nav>

<!-- Content -->
<div class="admin-main">
    {% block content %}{% endblock %}
</div>

<!-- Mobile Bottom Nav -->
<nav class="admin-bottom-nav">
    <div class="nav-items">
        <a href="/admin" class="nav-item {% if request.url.path == '/admin' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i>
            <span>الإحصائيات</span>
        </a>
        <a href="/admin" class="nav-item {% if 'merchants' in request.url.path %}active{% endif %}">
            <i class="fas fa-users"></i>
            <span>التجار</span>
        </a>
        <a href="/admin/logout" class="nav-item" style="color:rgba(248,113,113,0.6);">
            <i class="fas fa-sign-out-alt"></i>
            <span>خروج</span>
        </a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
